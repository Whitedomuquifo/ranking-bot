<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tops Duelistas Da Ranking</title>
  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --text:#111111;
      --muted:#666666;
      --border:#dddddd;
      --line:#eeeeee;
      --shadow:0 4px 14px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0f1115;
        --card:#181c23;
        --text:#f2f4f8;
        --muted:#a8b0bd;
        --border:#2a313d;
        --line:#2a313d;
        --shadow:0 6px 18px rgba(0,0,0,.35);
      }
    }
    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      margin:0;
      padding:20px;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1200px;margin:0 auto;}
    .page-title{
      margin:0 0 18px;
      text-align:center;
      font-size:clamp(22px, 3vw, 34px);
      font-weight:800;
      letter-spacing:.3px;
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
    @media (max-width: 900px){.grid{grid-template-columns:1fr;}}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .card h2{
      margin:0 0 14px;
      font-size:clamp(16px, 2vw, 22px);
      line-height:1.35;
    }
    .box{overflow:auto;border-radius:12px;}
    table{width:100%;border-collapse:collapse;min-width:520px;}
    th,td{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:middle;
    }
    th{
      position:sticky;
      top:0;
      background:var(--card);
      z-index:1;
      font-weight:700;
    }
    .user{display:flex;align-items:center;gap:10px;}
    .user img{
      width:42px;
      height:42px;
      border-radius:999px;
      object-fit:cover;
      flex:0 0 auto;
      border:1px solid var(--border);
    }
    .muted{color:var(--muted);font-size:.9em;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="page-title">Tops Duelistas Da Ranking</h1>

    <div class="grid">
      <section class="card">
        <h2>Yu-Gi-Oh! ARC-V Tag Force Special (Top 10)</h2>
        <div id="rank-arcv" class="box">Carregando...</div>
      </section>

      <section class="card">
        <h2>Yu-Gi-Oh! GX Tag Force 1 (Top 10)</h2>
        <div id="rank-tf1" class="box">Carregando...</div>
      </section>
    </div>
  </div>

  <script>
    const DATA_URL = "https://raw.githubusercontent.com/Whitedomuquifo/ranking-bot/main/data/ranking_public.json";
    const TOP_N = 10;

    function esc(s){
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function pos(i){
      return (i + 1) + "º";
    }

    function render(el, items){
      if(!el) return;
      if(!Array.isArray(items) || !items.length){
        el.innerHTML = "<span class='muted'>Sem dados.</span>";
        return;
      }

      const top = items
        .slice()
        .sort((a,b) => Number(b.points||0) - Number(a.points||0))
        .slice(0, TOP_N);

      const rows = top.map((u,i) => {
        const id = String(u.id || "");
        const name = u.name ? String(u.name) : ("ID: " + id);
        const avatar = u.avatar_url ? String(u.avatar_url) : "https://cdn.discordapp.com/embed/avatars/0.png";
        const pts = Number(u.points || 0);

        return `
          <tr>
            <td>${pos(i)}</td>
            <td>
              <div class="user">
                <img src="${avatar}" alt="avatar" loading="lazy" referrerpolicy="no-referrer">
                <div>
                  <div>${esc(name)}</div>
                  <div class="muted">${esc(id)}</div>
                </div>
              </div>
            </td>
            <td>${pts}</td>
          </tr>
        `;
      }).join("");

      el.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Posição</th>
              <th>Duelista</th>
              <th>Pontos</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    (async () => {
      const arcvEl = document.getElementById("rank-arcv");
      const tf1El = document.getElementById("rank-tf1");

      try{
        const res = await fetch(DATA_URL + "?v=" + Date.now(), { cache:"no-store" });
        if(!res.ok) throw new Error("Falha ao carregar JSON (" + res.status + ")");
        const data = await res.json();

        render(arcvEl, data.arcv || []);
        render(tf1El, data.tf1 || []);
      }catch(e){
        const msg = "<span class='muted'>Erro: " + esc(e.message) + "</span>";
        if(arcvEl) arcvEl.innerHTML = msg;
        if(tf1El) tf1El.innerHTML = msg;
      }
    })();
  </script>
</body>
</html>
